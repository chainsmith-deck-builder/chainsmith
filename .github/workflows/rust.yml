name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  DATABASE_URL: postgres://chainsmith:chainsmith@localhost:5432/chainsmith
  SQLX_OFFLINE: "true"

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chainsmith
          POSTGRES_PASSWORD: chainsmith
          POSTGRES_DB: chainsmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Unit tests
        run: cargo test --lib --bins --verbose

      - name: Integration tests (DB-backed)
        # `tests/` files exercise real Postgres via sqlx::test (per-test DBs).
        # SQLX_OFFLINE is unset here so query macros validate against the
        # running database — catches any schema/cache drift CI-side.
        env:
          SQLX_OFFLINE: "false"
        run: cargo test --tests --verbose

      - name: OpenAPI spec is up to date
        # The committed openapi.json must match what the code generates.
        # If this fails, run `cargo run --bin export_openapi openapi.json`
        # locally, commit the result, and push.
        run: |
          cargo run --quiet --bin export_openapi -- /tmp/generated-openapi.json
          if ! diff -q openapi.json /tmp/generated-openapi.json >/dev/null; then
            echo "openapi.json is stale relative to the API code." >&2
            diff -u openapi.json /tmp/generated-openapi.json >&2 || true
            exit 1
          fi
